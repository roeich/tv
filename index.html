<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/swiper-bundle.min.css">
    <title>Watch TV</title>
</head>
<body>
    <div class="tv_iframe">
        <video id="tv_video"
            autoplay
            controls
            loop
            playsinline>
        </video>

        <div class="controls">

            <button id="speedDown">-</button>

            <span id="speedValue">1.0x</span>

            <button id="speedUp">+</button>

        </div>

        <div class="channel_wrapper">

            <div class="channel_track" id="channelTrack">
                <a class="channel_btn" href="assets/video/video1.mp4">
                    <img src="assets/img/btns/ant.webp">
                </a>
                <a class="channel_btn" href="assets/video/video2.mp4">
                    <img src="assets/img/btns/baby-chick.webp">
                </a>
                <a class="channel_btn" href="assets/video/video1.mp4">
                    <img src="assets/img/btns/badger.webp">
                </a>
                <a class="channel_btn" href="assets/video/video2.mp4">
                    <img src="assets/img/btns/bat.webp">
                </a>
                <a class="channel_btn" href="assets/video/video1.mp4">
                    <img src="assets/img/btns/bear.webp">
                </a>
                <a class="channel_btn" href="assets/video/video2.mp4">
                    <img src="assets/img/btns/beaver.webp">
                </a>
            </div>

        </div>

    </div>

    <audio id="tickSound" src="assets/audio/scroll.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/Draggable.min.js"></script>
    <script src="assets/js/script.js"></script>
</body>

</html>
